<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashboardPro Inventory Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        section {
            margin-bottom: 20px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }
        th {
            background-color: #35424a;
            color: white;
        }
        .profit {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>DashboardPro Inventory Management</h1>
    </header>
    <main>
        <section id="inventory">
            <h2>Inventory Tracking</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th>Cost Price</th>
                        <th>Selling Price</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody id="inventory-table-body">
                    <!-- Inventory items will be dynamically added here -->
                </tbody>
            </table>
        </section>
        <section id="analytics">
            <h2>Analytics</h2>
            <div>
                <p>Total Profit: <span class="profit" id="total-profit">$0.00</span></p>
                <p>Total Inventory Value: <span id="total-inventory-value">$0.00</span></p>
            </div>
        </section>
        <section id="controls">
            <h2>Controls</h2>
            <button onclick="addItem()">Add Item</button>
        </section>
    </main>

    <script>
        let totalProfit = 0;
        let totalInventoryValue = 0;

        function addItem() {
            const itemName = prompt("Enter item name:");
            const quantity = parseInt(prompt("Enter quantity:"));
            const costPrice = parseFloat(prompt("Enter cost price:"));
            const sellingPrice = parseFloat(prompt("Enter selling price:"));
            const profit = (sellingPrice - costPrice) * quantity;

            totalProfit += profit;
            totalInventoryValue += sellingPrice * quantity;

            const tableBody = document.getElementById("inventory-table-body");
            const row = tableBody.insertRow();
            row.innerHTML = `<td>${itemName}</td><td>${quantity}</td><td>${costPrice.toFixed(2)}</td><td>${sellingPrice.toFixed(2)}</td><td>${profit.toFixed(2)}</td>`;

            document.getElementById("total-profit").innerText = `$${totalProfit.toFixed(2)}`;
            document.getElementById("total-inventory-value").innerText = `$${totalInventoryValue.toFixed(2)}`;
        }
    </script>
</body>
</html>
